spring.application.name=Api-Gateway

server.port=9090
jwt.secret=3b0a560c5c4ad48f09d73723e9e74fd095eeb40173c4ccd5b72ef4afe0789dc6
jwt.expiration-ms=86400000 

# Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Route 0 ? User Module
spring.cloud.gateway.routes[0].id=user-route
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**

# Route 1 ? Reservation Service
spring.cloud.gateway.routes[1].id=reservation-route
spring.cloud.gateway.routes[1].uri=lb://reservation-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/reservations/**

# Route 2 ? Slot Management Service
spring.cloud.gateway.routes[2].id=slot-route
spring.cloud.gateway.routes[2].uri=lb://slotManagement-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/slots/**

# Route 3 ? Vehicle Logging Service
spring.cloud.gateway.routes[3].id=vehicleLog-route
spring.cloud.gateway.routes[3].uri=lb://vehicleLog-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/logs/**

#Route 4 ? Invoice Service
spring.cloud.gateway.routes[4].id=invoice-route
spring.cloud.gateway.routes[4].uri=lb://invoice-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/billing/**