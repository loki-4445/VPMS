<header class="h-14 bg-indigo-700 shadow-lg flex items-center px-4 gap-4 z-40 relative">
  <!-- Brand -->
  <a routerLink="/dashboard" class="flex items-center gap-2 text-white no-underline shrink-0">
    <div class="w-8 h-8 bg-white/20 rounded-lg flex items-center justify-center">
      <i class="bi bi-p-circle-fill text-white text-base"></i>
    </div>
    <span class="font-bold text-base tracking-wide">VPMS</span>
    <span class="hidden md:inline text-white/60 text-xs font-normal">Vehicle Parking Management</span>
  </a>

  <div class="flex-1"></div>

  <!-- User info -->
  <div class="flex items-center gap-2">
    <div class="hidden sm:flex items-center gap-2">
      <span class="flex items-center gap-1.5 bg-white/15 text-white text-xs font-medium px-3 py-1.5 rounded-full">
        <i class="bi bi-person-circle"></i>
        {{ auth.getEmail() }}
      </span>
      <span class="flex items-center gap-1 text-xs font-semibold px-2.5 py-1.5 rounded-full"
        [class.bg-purple-200]="auth.isAdmin()"
        [class.text-purple-900]="auth.isAdmin()"
        [class.bg-blue-200]="auth.isStaff()"
        [class.text-blue-900]="auth.isStaff()"
        [class.bg-teal-200]="auth.isCustomer()"
        [class.text-teal-900]="auth.isCustomer()">
        <i class="bi bi-shield-fill"></i>
        {{ auth.getRole() }}
      </span>
    </div>
    <button (click)="logout()"
      class="flex items-center gap-1.5 text-white/90 hover:text-white hover:bg-white/20 text-xs font-semibold px-3 py-1.5 rounded-lg transition-all duration-200 border border-white/20">
      <i class="bi bi-box-arrow-right"></i>
      <span class="hidden sm:inline">Logout</span>
    </button>
  </div>
</header>
