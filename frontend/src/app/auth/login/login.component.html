<div class="min-h-screen bg-gradient-to-br from-indigo-900 via-purple-900 to-indigo-800 flex items-center justify-center p-4">
  <div class="w-full max-w-4xl bg-white rounded-2xl shadow-2xl overflow-hidden flex animate-scale-in">

    <!-- Left brand panel -->
    <div class="hidden md:flex w-5/12 gradient-primary flex-col items-center justify-center p-10 text-white">
      <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mb-6 shadow-glow">
        <i class="bi bi-p-circle-fill text-4xl"></i>
      </div>
      <h2 class="text-2xl font-bold text-center mb-2">Vehicle Parking Management</h2>
      <p class="text-white/70 text-center text-sm mb-8">Smart parking solutions for modern spaces</p>
      <div class="flex gap-6 mt-2">
        <div class="text-center animate-slide-up delay-100">
          <div class="text-2xl font-bold">500+</div>
          <div class="text-white/60 text-xs mt-1">Slots</div>
        </div>
        <div class="w-px bg-white/20"></div>
        <div class="text-center animate-slide-up delay-200">
          <div class="text-2xl font-bold">24/7</div>
          <div class="text-white/60 text-xs mt-1">Support</div>
        </div>
        <div class="w-px bg-white/20"></div>
        <div class="text-center animate-slide-up delay-300">
          <div class="text-2xl font-bold">100%</div>
          <div class="text-white/60 text-xs mt-1">Secure</div>
        </div>
      </div>
    </div>

    <!-- Right form panel -->
    <div class="flex-1 flex flex-col justify-center p-8 md:p-10">
      <!-- Mobile logo -->
      <div class="flex items-center gap-2 mb-6 md:hidden">
        <i class="bi bi-p-circle-fill text-2xl text-indigo-600"></i>
        <span class="font-bold text-lg text-indigo-600">VPMS</span>
      </div>

      <h3 class="text-2xl font-bold text-slate-800 mb-1">Welcome back</h3>
      <p class="text-slate-500 text-sm mb-6">Sign in to your account</p>

      @if (registered()) {
        <div class="flex items-center gap-2 bg-green-50 border border-green-200 text-green-800 rounded-lg px-4 py-3 mb-4 text-sm animate-fade-in">
          <i class="bi bi-check-circle-fill text-green-500"></i>
          <span>Account created! You can now sign in.</span>
        </div>
      }
      @if (error()) {
        <div class="flex items-center gap-2 bg-red-50 border border-red-200 text-red-800 rounded-lg px-4 py-3 mb-4 text-sm animate-fade-in">
          <i class="bi bi-exclamation-circle-fill text-red-500"></i>
          <span>{{ error() }}</span>
        </div>
      }

      <form (ngSubmit)="login()" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Email Address</label>
          <div class="flex rounded-lg border border-slate-200 focus-within:border-indigo-500 focus-within:ring-2 focus-within:ring-indigo-200 transition-all duration-200 bg-white overflow-hidden">
            <span class="flex items-center px-3 bg-slate-50 border-r border-slate-200">
              <i class="bi bi-envelope text-slate-400"></i>
            </span>
            <input type="email" class="flex-1 px-3 py-2.5 text-sm outline-none bg-white"
              placeholder="you@example.com"
              [(ngModel)]="email" name="email" required autocomplete="email" />
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
          <div class="flex rounded-lg border border-slate-200 focus-within:border-indigo-500 focus-within:ring-2 focus-within:ring-indigo-200 transition-all duration-200 bg-white overflow-hidden">
            <span class="flex items-center px-3 bg-slate-50 border-r border-slate-200">
              <i class="bi bi-lock text-slate-400"></i>
            </span>
            <input [type]="showPassword() ? 'text' : 'password'"
              class="flex-1 px-3 py-2.5 text-sm outline-none bg-white"
              placeholder="Enter your password"
              [(ngModel)]="password" name="password" required autocomplete="current-password" />
            <button type="button"
              class="flex items-center px-3 bg-slate-50 border-l border-slate-200 text-slate-400 hover:text-slate-600 transition-colors"
              (click)="showPassword.update(v => !v)">
              <i class="bi" [class.bi-eye]="!showPassword()" [class.bi-eye-slash]="showPassword()"></i>
            </button>
          </div>
        </div>

        <button type="submit"
          class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition-all duration-200 disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2 mt-2"
          [disabled]="loading()">
          @if (loading()) {
            <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
            </svg>
            Signing in...
          } @else {
            <i class="bi bi-box-arrow-in-right"></i>
            Sign In
          }
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-slate-500">
        Don't have an account?
        <a routerLink="/register" class="ml-1 font-semibold text-indigo-600 hover:text-indigo-800 transition-colors">Create account</a>
      </p>
    </div>
  </div>
</div>
